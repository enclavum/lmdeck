</g>
<text x="32" y="18" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:15px;font-weight:400;text-anchor:start;dominant-baseline:auto">OpenAI client <tspan style="font-size:12px;fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">(Open WebUI · your IDE · curl · scripts)</tspan></text>
<text x="86" y="45" xml:space="preserve" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">POST /v1/chat/completions   { "model": "qwen3.6:27b", … }</text>
<text x="270" y="86" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LMDeck<tspan style="font-size:13px;font-style:italic;fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">  ·  http://localhost:5678/v1</tspan></text>
<text x="82" y="122" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">1</text>
<text x="100" y="122" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Resolve engine</text>
<text x="100" y="140" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"qwen3.6:27b"  →  the engine that owns it</text>
<text x="82" y="164" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">2</text>
<text x="100" y="164" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Check model status</text>
<text x="100" y="182" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">Is the model already loaded?</text>
<text x="100" y="200" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">• Yes  →  forward (step 4)</text>
<text x="82" y="224" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">3</text>
<text x="100" y="224" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Admit</text>
<text x="100" y="242" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">Will the model fit in free RAM (minus a safety reserve)?</text>
<text x="100" y="260" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">• Fits  →  forward (step 4)</text>
<text x="100" y="278" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">• Needs room  →  evict the least-recently-used unpinned</text>
<text x="118" y="296" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">model across any engine, then load</text>
<text x="100" y="314" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">• Still won't fit  →  503 insufficient_memory (never an OOM)</text>
<text x="82" y="338" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">4</text>
<text x="100" y="338" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Stream</text>
<text x="100" y="356" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">The SSE response straight back, unbuffered</text>
<text x="154" y="418" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Ollama</text>
<text x="270" y="418" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">oMLX</text>
<text x="328" y="420" text-anchor="middle" font-size="18" style="font-family:'Comic Neue','Comic Sans MS',cursive;fill:#2b2b2b;fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:18px;font-weight:400;text-anchor:middle;dominant-baseline:auto">...</text>
<text x="406" y="418" style="fill:rgb(43, 43, 43);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Comic Neue&quot;, &quot;Comic Sans MS&quot;, cursive;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">More engines</text>
</svg>